<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shivoham Foundation</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; line-height: 1.7; font-weight: 400; color: #333; }

    h1, h2, h3 { font-weight: 700; letter-spacing: 0.5px; }
    p { font-weight: 300; font-size: 16px; color: #555; }

    header {
      background: linear-gradient(to right, #ff8000, #ff9933, #ffcc66);
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .header-container {
      max-width: 1200px;
      margin: auto;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; }

    nav a {
      color: white;
      margin-left: 25px;
      text-decoration: none;
      font-weight: 500;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      background: white;
      left: 0;
      bottom: -5px;
      transition: 0.3s;
    }

    nav a:hover::after { width: 100%; }

    .hero {
      height: 90vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('temple.jpeg');
      background-size: cover;
      background-position: center center;
      filter: contrast(1.1) brightness(1.05) saturate(1.1);
      image-rendering: auto;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .hero h2 {
      font-size: 56px;
      margin-bottom: 15px;
      font-weight: 700;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,215,0,0.8), 0 0 20px rgba(255,215,0,0.6), 0 0 30px rgba(255,140,0,0.6);
      animation: glow 2s ease-in-out infinite alternate, fadeUp 1.5s ease forwards;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px rgba(255,215,0,0.6), 0 0 20px rgba(255,140,0,0.5); }
      to { text-shadow: 0 0 20px rgba(255,215,0,1), 0 0 40px rgba(255,140,0,0.9); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero p { font-size: 20px; margin-bottom: 20px; font-weight: 300; }

    .btn {
      background: linear-gradient(45deg, #ff8000, #ffcc33);
      color: white;
      padding: 12px 25px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    section { padding: 60px 40px; }
    .container { max-width: 1100px; margin: auto; }

    .section-title {
      text-align: center;
      margin-bottom: 40px;
      font-size: 32px;
      font-weight: 700;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      border-top: 4px solid #ff9933;
      text-align: center;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover { transform: translateY(-10px); }
    .card img { width: 60px; height: 60px; margin-bottom: 15px; }
    .card h3 { margin-bottom: 10px; }

    .contact p { margin-bottom: 10px; }

    footer {
      background: #cc6600;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Floating Contact Button */
    .floating-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(45deg, #ff8000, #ffcc33);
      color: white;
      padding: 15px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      z-index: 999;
    }

    /* Contact Form */
    .contact-form {
      max-width: 500px;
      margin: 30px auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .contact-form input,
    .contact-form textarea {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-family: 'Poppins', sans-serif;
    }

    .contact-form button {
      background: linear-gradient(45deg, #ff8000, #ffcc33);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Scan to Donate Animation */
    .scan-text {
      font-size: 18px;
      font-weight: 600;
      color: #ff8000;
      animation: pulseText 1.5s infinite;
    }

    @keyframes pulseText {
      0% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0.6; transform: scale(1); }
    }
